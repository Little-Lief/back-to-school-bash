<section class="hero">
  <div class="hero__overlay"></div>
  <div class="hero__content container">
    <p class="section-label">Jones Gym Presents</p>
    <h1 class="hero__title">4th Annual<br><span class="hero__title--gold">Back to School</span><br>Bash</h1>
    <p class="hero__date">
      <span class="hero__date-icon">📅</span>
      August 15, 2026 &nbsp;|&nbsp; The Jones Gym
    </p>
    <p class="hero__sub">A free community event giving kids the tools and inspiration they need to succeed in the classroom.</p>
    <div class="hero__cta">
      <button class="btn btn--primary" (click)="scrollTo('register')">Sponsor or Volunteer</button>
      <button class="btn btn--outline" (click)="scrollTo('about')">Learn More</button>
    </div>

    <!-- Share bar -->
    <div class="hero__share">
      <span class="hero__share-label">Share this event</span>
      <div class="hero__share-buttons">

        <!-- Native share (mobile only) -->
        @if (canNativeShare) {
          <button class="hero__share-btn hero__share-btn--native" (click)="nativeShare()" title="Share">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            Share
          </button>
        }

        <!-- Facebook -->
        <a class="hero__share-btn hero__share-btn--facebook"
           [href]="shareLinks.facebook" target="_blank" rel="noopener noreferrer" title="Share on Facebook">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
          Facebook
        </a>

        <!-- X / Twitter -->
        <a class="hero__share-btn hero__share-btn--x"
           [href]="shareLinks.x" target="_blank" rel="noopener noreferrer" title="Share on X">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          X
        </a>

        <!-- LinkedIn -->
        <a class="hero__share-btn hero__share-btn--linkedin"
           [href]="shareLinks.linkedin" target="_blank" rel="noopener noreferrer" title="Share on LinkedIn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          LinkedIn
        </a>

        <!-- WhatsApp -->
        <a class="hero__share-btn hero__share-btn--whatsapp"
           [href]="shareLinks.whatsapp" target="_blank" rel="noopener noreferrer" title="Share on WhatsApp">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.107.549 4.085 1.51 5.805L.057 23.25l5.594-1.467A11.952 11.952 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.706 9.706 0 0 1-5.002-1.381l-.36-.213-3.32.871.885-3.234-.234-.373A9.713 9.713 0 0 1 2.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/></svg>
          WhatsApp
        </a>

        <!-- Copy link -->
        <button class="hero__share-btn hero__share-btn--copy" (click)="copyLink()" title="Copy link">
          @if (copied) {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Copied!
          } @else {
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy Link
          }
        </button>

      </div>
    </div>
  </div>
  <div class="hero__scroll-hint" (click)="scrollTo('about')">
    <span></span>
  </div>
</section>
