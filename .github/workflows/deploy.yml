name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject environment variables
        run: node scripts/set-env.js
        env:
          SHEETS_SCRIPT_URL: ${{ secrets.SHEETS_SCRIPT_URL }}
          SHEETS_SECRET_TOKEN: ${{ secrets.SHEETS_SECRET_TOKEN }}

      - name: Build
        run: npm run build -- --configuration production --base-href /

      - name: Copy index.html to 404.html (fixes deep-link routing)
        run: cp dist/back-to-school-bash/browser/index.html dist/back-to-school-bash/browser/404.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/back-to-school-bash/browser
          branch: gh-pages
          clean: true
